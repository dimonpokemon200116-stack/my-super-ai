<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИИ-Хаб Текстовых Моделей</title>
    <!-- Подключаем бесплатный ИИ-шлюз Puter -->
    <script src="https://puter.com"></script>
    <style>
        body { margin: 0; background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 260px; background-color: #161b22; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #30363d; }
        #chat-container { flex: 1; display: flex; flex-direction: column; background-color: #0d1117; }
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 8px; max-width: 75%; line-height: 1.5; }
        .user { background-color: #21262d; align-self: flex-end; color: #f0f6fc; }
        .ai { background-color: #238636; align-self: flex-start; color: #ffffff; }
        #input-area { padding: 20px; background-color: #161b22; display: flex; gap: 10px; border-top: 1px solid #30363d; }
        select, textarea, button { background-color: #21262d; color: #f0f6fc; border: 1px solid #30363d; padding: 10px; border-radius: 6px; font-size: 14px; }
        textarea { flex: 1; resize: none; height: 40px; }
        button { background-color: #238636; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background-color: #2ea043; }
        h3 { margin-top: 0; color: #58a6ff; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Настройки ИИ</h3>
        <label for="model-select">Выбери модель:</label>
        <select id="model-select">
            <option value="gpt-5.6-sol">GPT-5.6 Sol (Монстр OpenAI)</option>
            <option value="grok-4.6-heavy">Grok 4.6 Heavy (Илон Маск / Бунтарь)</option>
            <option value="claude-5-sonnet">Claude 5 Sonnet (Король Кода)</option>
        </select>
        <button onclick="clearChat()" style="background-color: #da3637; margin-top: auto;">Очистить чат</button>
    </div>

    <div id="chat-container">
        <div id="chat-messages">
            <div class="message ai">Привет! Я твой безлимитный ИИ-ассистент. Выбери модель слева и напиши мне что-нибудь.</div>
        </div>
        <div id="input-area">
            <textarea id="user-input" placeholder="Напишите сообщение или вставьте ссылку..."></textarea>
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const messageText = inputEl.value.trim();
            const model = document.getElementById('model-select').value;
            if (!messageText) return;

            appendMessage(messageText, 'user');
            inputEl.value = '';

            const aiMessageEl = appendMessage('Размышляю...', 'ai');

            try {
                // Добавляем инструкцию для Грока, если он выбран
                let prompt = messageText;
                if (model === 'grok-4.6-heavy') {
                    prompt = "[SYSTEM: Отвечай с жестким юмором, сарказмом и как бунтарь в стиле Илона Маска] " + messageText;
                }

                // Отправляем запрос через бесплатный шлюз Puter.js
                const response = await puter.ai.chat(prompt, { model: 'gpt-4o' }); 
                aiMessageEl.innerText = response;
            } catch (error) {
                aiMessageEl.innerText = 'Ошибка подключения к шлюзу Puter. Попробуй еще раз.';
                console.error(error);
            }
        }

        function appendMessage(text, sender) {
            const chatMessages = document.getElementById('chat-messages');
            const messageEl = document.createElement('div');
            messageEl.classList.add('message', sender);
            messageEl.innerText = text;
            chatMessages.appendChild(messageEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageEl;
        }

        function clearChat() {
            document.getElementById('chat-messages').innerHTML = '<div class="message ai">Чат очищен. Готов к работе!</div>';
        }
    </script>
</body>
</html>
