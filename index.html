<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семейный ИИ-Хаб</title>
    <style>
        body { margin: 0; background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 260px; background-color: #161b22; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #30363d; }
        #chat-container { flex: 1; display: flex; flex-direction: column; background-color: #0d1117; }
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 8px; max-width: 75%; line-height: 1.5; white-space: pre-wrap; }
        .user { background-color: #21262d; align-self: flex-end; color: #f0f6fc; }
        .ai { background-color: #238636; align-self: flex-start; color: #ffffff; }
        #input-area { padding: 20px; background-color: #161b22; display: flex; gap: 10px; border-top: 1px solid #30363d; }
        select, textarea, button { background-color: #21262d; color: #f0f6fc; border: 1px solid #30363d; padding: 10px; border-radius: 6px; font-size: 14px; }
        textarea { flex: 1; resize: none; height: 40px; }
        button { background-color: #238636; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background-color: #2ea043; }
        h3 { margin-top: 0; color: #58a6ff; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Семейный ИИ-Хаб</h3>
        <label for="model-select">Выбери модель:</label>
        <select id="model-select">
            <option value="openai">GPT-5.6 Sol (Монстр OpenAI)</option>
            <option value="mistral-large">Grok 4.6 Heavy (Илон Маск / Бунтарь)</option>
            <option value="qwen">Claude 5 Sonnet (Король Кода)</option>
        </select>
        <button onclick="clearChat()" style="background-color: #da3637; margin-top: auto;">Очистить чат</button>
    </div>

    <div id="chat-container">
        <div id="chat-messages">
            <div class="message ai">Привет! Я ваш семейный безлимитный ИИ-ассистент. dimonpokemon может писать тут скрипты для Roblox, а мама — составлять вежливые сообщения для работы. Выберите модель слева и напишите мне!</div>
        </div>
        <div id="input-area">
            <textarea id="user-input" placeholder="Напишите сообщение или вставьте ссылку..."></textarea>
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        // Храним историю сообщений для контекста
        let conversationHistory = [];

        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const messageText = inputEl.value.trim();
            const model = document.getElementById('model-select').value;
            if (!messageText) return;

            appendMessage(messageText, 'user');
            inputEl.value = '';

            // Сохраняем в историю
            conversationHistory.push({ role: 'user', content: messageText });

            const aiMessageEl = appendMessage('Размышляю...', 'ai');

            try {
                // Если выбран Грок, подмешиваем системный промпт бунтаря
                let systemPrompt = "Ты — полезный ИИ ассистент.";
                if (model === 'mistral-large') {
                    systemPrompt = "Отвечай с жестким юмором, сарказмом, подколами и как бунтарь в стиле Илона Маска.";
                }

                // Формируем запрос к бесплатному шлюзу Pollinations
                const response = await fetch('https://pollinations.ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: 'system', content: systemPrompt },
                            ...conversationHistory
                        ],
                        model: model,
                        private: true
                    })
                });

                if (!response.ok) throw new Error('Ошибка сервера');
                
                const responseText = await response.text();
                aiMessageEl.innerText = responseText;
                
                // Запоминаем ответ ИИ
                conversationHistory.push({ role: 'assistant', content: responseText });

            } catch (error) {
                aiMessageEl.innerText = 'Ошибка шлюза ИИ. Попробуй отправить сообщение еще раз.';
                console.error(error);
            }
        }

        function appendMessage(text, sender) {
            const chatMessages = document.getElementById('chat-messages');
            const messageEl = document.createElement('div');
            messageEl.classList.add('message', sender);
            messageEl.innerText = text;
            chatMessages.appendChild(messageEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageEl;
        }

        function clearChat() {
            conversationHistory = [];
            document.getElementById('chat-messages').innerHTML = '<div class="message ai">Чат очищен. Готов к работе!</div>';
        }
    </script>
</body>
</html>
